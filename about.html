<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>แกลเลอรีแนวตั้ง</title>

<style>
  body {
    font-family: Arial, sans-serif;
  }

  .gallery {
    width: 60%;
    margin: auto;
  }

  .item {
    margin-bottom: 30px;
    text-align: center;
  }

  .item img {
    width: 100%;
    height: auto;
    border-radius: 10px;
  }

  .caption {
    margin-top: 10px;
    font-size: 18px;
  }
</style>
</head>

<body>

<h2 style="text-align:center;">สถานที่ท่องเที่ยว</h2>

<div class="gallery">

  <div class="item">
    <img src="img1.jpg">
    <div class="caption">น้ำตกสวยงาม</div>
  </div>

  <div class="item">
    <img src="img2.jpg">
    <div class="caption">ธรรมชาติอุดมสมบูรณ์</div>
  </div>

  <div class="item">
    <img src="img3.jpg">
    <div class="caption">จุดชมวิวภูเขา</div>
  </div>

  <div class="item">
    <img src="img4.jpg">
    <div class="caption">เส้นทางเดินป่า</div>
  </div>

  <div class="item">
    <img src="img5.jpg">
    <div class="caption">บรรยากาศยามเช้า</div>
  </div>

</div>

</body>
</html>
