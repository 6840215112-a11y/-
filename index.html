<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khao Yai</title>
 <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Header */
    .top-bar {
      background: black;
      color: white;
      text-align: center;
      padding: 15px;
    }

    .top-bar small {
      display: block;
      color: #ccc;
    }

    /* Hero Section */
    .hero {
      background: url(ปก.jpg) no-repeat center center/cover;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      position: relative;
    }

    .hero h1 {
      font-size: 50px;
      margin: 0;
    }

    .hero p {
      font-size: 24px;
      margin: 5px 0 0;
    }

    /* Navbar */
    .navbar {
      background: #555;
      display: flex;
      justify-content: center;
    }

    .navbar a {
      color: white;
      padding: 15px 25px;
      text-decoration: none;
      font-size: 18px;
    }

    .navbar a:hover {
      background: #333;
    }

    /* Content */
    .content {
      padding: 40px;
    }

    .content h2 {
      font-size: 36px;
    }
  </style>
</head>
 <!-- Hero -->
  <div class="hero">
    <div>
      <h1>KHAO YAI</h1>
    </div>
  </div>
<body>

  <!-- Header -->
  <div class="top-bar">
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <a href="#">หน้าแรก</a>
    <a href="#">เกี่ยวกับ</a>
    <a href="#">รูป</a>
    <a href="#">ติดต่อ</a>
  </div>

  <!-- Content -->
  <div class="content">
    <img src="khao yai.jpg" alt="รูปเขาใหญ่" width="500">

    <h2>ที่มาของโครงการ</h2>
    <p>
      เว็บไซต์นี้จัดทำขึ้นเพื่อแนะนำสถานที่ท่องเที่ยวในเขาใหญ่
      โดยรวบรวมข้อมูลที่สำคัญเพื่ออำนวยความสะดวกแก่นักท่องเที่ยว
      และช่วยส่งเสริมการท่องเที่ยวในพื้นที่
    </p>
  </div>

</body>
</html>
