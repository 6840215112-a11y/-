<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Khao Yai</title>

  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
    }

    img {
      display: block;
      width: 100%;
    }
.text {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
}
    /* Hero */
    .hero {
      height: 300px;
      background-image: url("ปก.jpg"); /* รูปช้าง */
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero h1 {
      color: white;
      font-size: 64px;
      letter-spacing: 3px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
    }

    .navbar {
      background-color: #777;
      text-align: center;
      padding: 12px 0;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 16px;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    .content img {
      width: 100%;
      height: auto;
    }

    .text {
      padding: 20px;
    }

    .text h2 {
      margin-bottom: 32px;
    }

    .text p {
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <!-- Hero -->
  <div class="hero">
    <h1>KHAO YAI</h1>
  </div>

  <!-- Navbar -->
  <div class="navbar">
    <a href="#">หน้าแรก</a>
    <a href="#">เกี่ยวกับ</a>
    <a href="#">รูป</a>
    <a href="#">ติดต่อ</a>
  </div>

  <!-- Content -->
  <div class="content">
    <img src="khao yai.jpg" alt="เขาใหญ่">

    <div class="text">
      <h2>ที่มาของโครงการ</h2>
      
      <p>
        เว็บไซต์นี้จัดทำขึ้นเพื่อนำเสนอแหล่งท่องเที่ยวในเขาใหญ่
        โดยรวบรวมข้อมูลที่สำคัญเพื่ออำนวยความสะดวกแก่นักท่องเที่ยว
        และช่วยส่งเสริมการท่องเที่ยวในพื้นที่
      </p>
      
    </div>
  </div>

</body>
</html>
